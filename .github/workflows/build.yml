name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        python3 -m pip install --upgrade pip
        pip3 install buildozer cython

    - name: Build APK
      run: |
        # 直接修改已有的 buildozer.spec（如果文件不存在，则先 init，但这里已存在）
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/# android.gradle_repository = .*/android.gradle_repository = https:\/\/mirrors.cloud.tencent.com\/gradle\//' buildozer.spec
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
