name: Build Kivy APK

on:
  workflow_dispatch: # 手动触发，方便调试

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Accept Android SDK Licenses
        run: echo "yes" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK with Buildozer
        run: |
          # 清理缓存
          rm -rf .buildozer
          yes | buildozer android debug
